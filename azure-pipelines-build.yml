# Build Pipeline — builds the Docker image and pushes it to Azure Container Registry.
# Place this file in the repo root as azure-pipelines-build.yml, then create a new
# pipeline in Azure DevOps pointing at this file.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/*

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'acr-claims-connection'
  imageRepository: 'claims-status-aks'
  containerRegistry: 'acrclaimsstatus110587.azurecr.io'
  dockerfilePath: 'app/Dockerfile'
  buildContext: 'app'
  tag: '$(Build.BuildId)'

stages:
  - stage: Build
    displayName: Build and push image
    jobs:
      - job: Build
        displayName: Build and push (ARM64)
        steps:
          # The AKS node SKU used in this project (Standard_B2ps_v2) is ARM64.
          # The hosted ubuntu-latest agent is x86_64, so we need Docker Buildx
          # with QEMU emulation to cross-build for linux/arm64.
          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)

          - script: |
              docker run --rm --privileged tonistiigi/binfmt --install all
              docker buildx create --use
              docker buildx build \
                --platform linux/arm64 \
                -t $(containerRegistry)/$(imageRepository):$(tag) \
                -t $(containerRegistry)/$(imageRepository):latest \
                --push \
                $(buildContext)
            displayName: Buildx build and push (linux/arm64)